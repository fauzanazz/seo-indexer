name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: indexer-linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: indexer-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: indexer-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: indexer-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/indexer.exe ${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/indexer ${{ matrix.artifact }}
          fi
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact }}
